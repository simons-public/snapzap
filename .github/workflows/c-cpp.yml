name: C/C++ CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: install dependencies
      run: sudo apt install -qq zfsutils-linux libzfslinux-dev build-essential cmake bats parallel
    - name: make
      run: make
    - name: test install
      run: |
        make install
        /usr/local/bin/snapzap || true
    - name: run tests
      run: |
        cp build/snapzap ./
        bats bats --jobs 5 --trace --verbose-run --pretty tests/
